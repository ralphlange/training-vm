---
- name: Load distribution variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] }}.yml"
        - "{{ ansible_facts['os_family'] }}.yml"

- name: Print all available facts for debugging
  # 'cd ansible; ansible localhost -m ansible.builtin.setup' will show this info
  ansible.builtin.debug:
    var: ansible_facts

- name: expand the root disk
  include_tasks: grow_disk.yml
  when: not in_container

- name: Replace mirrorlist with specific mirrors for Rocky
  when: ansible_facts['distribution'] == 'Rocky'
  become: true
  block:
    - name: Comment out mirrorlist for Rocky
      ansible.builtin.replace:
        path: "/etc/yum.repos.d/{{ item }}"
        regexp: "^(mirrorlist=.*)$"
        replace: "#\\1"
      with_items:
        - rocky.repo
        - rocky-extras.repo
        - rocky-devel.repo
        - rocky-addons.repo

    - name: Uncomment baseurl for Rocky
      ansible.builtin.replace:
        path: "/etc/yum.repos.d/{{ item }}"
        regexp: "^#(baseurl=.*)$"
        replace: "\\1"
      with_items:
        - rocky.repo
        - rocky-extras.repo
        - rocky-devel.repo
        - rocky-addons.repo

- name: APT Upgrade all packages; install Dev Tools and Gnome
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  block:
    - name: Upgrade all packages
      ansible.builtin.apt:
        name: "*"
        state: latest
        update_cache: true

    - name: Install Dev Tools
      ansible.builtin.apt:
        name:
          - build-essential
          - git
          - vim
          - curl
          - sudo
          - openssl

    - name: Install Gnome
      ansible.builtin.apt:
        name:
          - "{{ initial_setup_gnome_group }}"
      when: install_graphics | bool

- name: RPM Upgrade all packages; install Dev Tools and Gnome
  when: ansible_facts['os_family'] == 'RedHat'
  become: true
  block:
    - name: Upgrade all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Dev Tools
      ansible.builtin.dnf:
        name:
          - "@{{ initial_setup_devel_group }}"
          - gcc-c++
          - vim
          - sudo
          - openssl
        allowerasing: true # fix version conflicts for curl and coreutils on Rocky

    - name: Install Gnome
      ansible.builtin.dnf:
        name:
          - "@{{ initial_setup_gnome_group }}"
        allowerasing: true
      when: install_graphics | bool

- name: Change default target to graphical.target
  file:
    src: /usr/lib/systemd/system/graphical.target
    dest: /etc/systemd/system/default.target
    state: link
  become: true
  when: not in_container and install_graphics | bool

- name: Make XOrg the default display manager
  ansible.builtin.lineinfile:
    path: "{{ initial_setup_gdm_config }}"
    search_string: "WaylandEnable"
    line: "WaylandEnable=false"
  become: true
  when: not in_container and install_graphics | bool

- name: Create development user
  ansible.builtin.user:
    name: "{{ dev_user }}"
    shell: /bin/bash
    createhome: true
    password: ""
    comment: "EPICS Developer"
  become: true

- name: Make users passwordless for sudo in group wheel
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: "^%{{ dev_user }}"
    line: "%{{ dev_user }} ALL=(ALL) NOPASSWD: ALL"
    validate: "visudo -cf %s"
  become: true

- name: Hide user vagrant from the GDM greeter (login user select)
  ansible.builtin.template:
    src: user.conf_nogreeter
    dest: /var/lib/AccountsService/users/vagrant

- name: Ensure that python refers to python3 (fixes issue with Rocky container)
  ansible.builtin.file:
    src: /usr/bin/python3
    dest: /usr/bin/python
    state: link
  become: true
