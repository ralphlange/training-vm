---
- name: Set up training VM
  hosts: local

  pre_tasks:
    - name: Load OS-specific variables with fallback
      ansible.builtin.include_vars: "{{ item }}"
      with_first_found:
        - files:
            - "{{ ansible_facts['distribution'] }}_{{ ansible_facts['distribution_major_version'] }}.yml"
            - "{{ ansible_facts['distribution'] }}.yml"
            - "{{ ansible_facts['os_family'] }}.yml"
            - "default.yml"
          paths:
            - vars/os
      tags: always

  tasks:
    - name: Check that distro has been identified
      ansible.builtin.fail:
        msg: "Unsupported distro {{ ansible_facts['distribution'] }}."
      when: is_debian == false and is_redhat == false

    - name: Decide if graphics should be installed
      ansible.builtin.set_fact:
        install_graphics: "{{ install_graphics | bool or phoebus | default(false) | bool or oac_tree | default(false) | bool }}"
      tags: always

    - name: Initial setup
      include_role:
        name: initial_setup
      when: initial_setup is defined and initial_setup | bool
      tags: initial_setup

    - name: CA trust
      include_role:
        name: catrust
      when: catrust is defined and catrust | bool
      tags: catrust

    - name: EPICS Base
      include_role:
        name: m_base
      when: m_base is defined and m_base | bool
      tags: m_base

    - name: ASYN
      include_role:
        name: m_asyn
      when: m_asyn is defined and m_asyn | bool
      tags: m_asyn

    - name: Autosave
      include_role:
        name: m_autosave
      when: m_autosave is defined and m_autosave | bool
      tags: m_autosave

    - name: SScan
      include_role:
        name: m_sscan
      when: m_sscan is defined and m_sscan | bool
      tags: m_sscan

    - name: Calc
      include_role:
        name: m_calc
      when: m_calc is defined and m_calc | bool
      tags: m_calc

    - name: Busy
      include_role:
        name: m_busy
      when: m_busy is defined and m_busy | bool
      tags: m_busy

    - name: AreaDetector
      include_role:
        name: m_areadetector
      when: m_areadetector is defined and m_areadetector | bool
      tags: m_areadetector

    - name: OPC UA
      include_role:
        name: m_opcua
      when: m_opcua is defined and m_opcua | bool
      tags: m_opcua

    - name: P4P
      include_role:
        name: m_p4p
      when: m_p4p is defined and m_p4p | bool
      tags: m_p4p

    - name: pvaPy
      include_role:
        name: m_pvaPy
      when: m_pvaPy is defined and m_pvaPy | bool
      tags: m_pvaPy

    - name: Sequencer
      include_role:
        name: m_seq
      when: m_seq is defined and m_seq | bool
      tags: m_seq

    - name: StreamDevice
      include_role:
        name: m_stream
      when: m_stream is defined and m_stream | bool
      tags: m_stream

    - name: Docker
      include_role:
        name: docker
      when: docker is defined and docker | bool
      tags: docker

    - name: Bluesky
      when: bluesky is defined and bluesky | bool
      become: true
      become_user: "{{ dev_user }}"
      tags: bluesky
      block:
        - name: Run Bluesky role
          include_role:
            name: bluesky

    - name: Phoebus
      include_role:
        name: phoebus
      when: phoebus is defined and phoebus | bool
      tags: phoebus

    - name: OAC Tree
      include_role:
        name: oac_tree
      when: oac_tree is defined and oac_tree | bool
      tags: oac_tree

    - name: Archiver Appliance
      include_role:
        name: archiver_appliance
      when: archiver_appliance is defined and archiver_appliance | bool
      tags: archiver_appliance

  environment: "{{ proxy_env }}"
