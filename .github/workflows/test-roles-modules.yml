name: "Test Roles: EPICS Modules"

on:
  push:
    paths:
      - '.github/workflows/test-roles-modules.yml'
      - 'ansible/vars/ci-*.yml'
      - 'ansible/playbook.yml'
      - 'ansible/requirements.yml'
      - 'ansible/roles/m-*/**'
      - '!ansible/roles/m-base/**'
      - '!ansible/roles/m-areadetector/**'
  pull_request:
    paths:
    - '.github/workflows/test-roles-modules.yml'
    - 'ansible/vars/ci-*.yml'
    - 'ansible/playbook.yml'
    - 'ansible/requirements.yml'
    - 'ansible/roles/m-*/**'
    - '!ansible/roles/m-base/**'
    - '!ansible/roles/m-areadetector/**'
  workflow_dispatch:

jobs:
  check:
    uses: ./.github/workflows/_check.yml

  wait:
    needs: check
    if: needs.check.outputs.branch-pr == ''
    uses: ./.github/workflows/_wait_for_workflow.yml
    with:
      workflow_name: "Rebuild Container Images"
    permissions:
      actions: read

  prep:
    needs: [check, wait]
    if: always() && needs.check.outputs.branch-pr == '' && (needs.wait.result == 'success' || needs.wait.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      repo_name: ${{ steps.lowercase.outputs.repo_name }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - id: lowercase
        run: echo "repo_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      - id: tag
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflow_name = "Rebuild Container Images";

            if (context.eventName === 'pull_request') {
              const pr_num = context.payload.pull_request.number;
              const pr_tag = `pr-${pr_num}`;

              const workflows = await github.rest.actions.listRepoWorkflows({ owner, repo });
              const workflow = workflows.data.workflows.find(w => w.name === workflow_name);
              if (workflow) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  event: 'pull_request',
                  status: 'success'
                });
                // Check if any successful run exists for this specific PR
                const prRun = runs.data.workflow_runs.find(r =>
                  r.pull_requests && r.pull_requests.some(pr => pr.number === pr_num)
                );
                if (prRun) {
                  console.log(`Found successful '${workflow_name}' run for PR #${pr_num}. Using tag: ${pr_tag}`);
                  core.setOutput('image_tag', pr_tag);
                  return;
                }
              }
              console.log(`No successful '${workflow_name}' run found for PR #${pr_num}. Falling back to 'latest'.`);
              core.setOutput('image_tag', 'latest');
            } else {
              core.setOutput('image_tag', 'latest');
            }

  test:
    needs: [check, prep]
    name: "${{ matrix.distro }}: ${{ matrix.conf.name }}"
    if: always() && needs.prep.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, rocky, debian, fedora]
        conf:
          - name: "EPICS Modules"
            id: "ci-modules"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ needs.prep.outputs.repo_name }}/epics-training-base-${{ matrix.distro }}:${{ needs.prep.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build ${{ matrix.conf.name }}
        run: |
          cd ansible
          ansible-playbook -v playbook.yml -e "@vars/${{ matrix.conf.id }}.yml"
