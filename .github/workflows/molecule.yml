name: "Run molecule tests"

on:
  push:
    paths:
      - 'ansible/**'
  pull_request:
    paths:
      - 'ansible/**'

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        role: ["initial_setup"]
    steps:
      - uses: actions/checkout@v2
        with:
          path: "${{ github.repository }}"
      - uses: gofrolist/molecule-action@v2
        with:
          molecule_working_dir: "${{ github.repository }}/ansible/roles/${{ matrix.role }}"
